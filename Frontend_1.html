<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #4f6ef7;
    --accent-dark: #3a58e0;
    --bg: #f2f4f8;
    --white: #ffffff;
    --text: #1a1a2e;
    --text-muted: #8a8fa8;
    --border: #e4e7f0;
    --font: 'Inter', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: var(--font);
    font-size: 15px;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chat-shell {
    width: 100%;
    max-width: 430px;
    height: 100vh;
    max-height: 800px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 8px 48px rgba(0,0,0,0.13);
  }

  /* HEADER */
  .chat-header {
    background: var(--accent);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 11px;
    flex-shrink: 0;
  }

  .header-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.45);
    overflow: hidden;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .header-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .header-name {
    flex: 1;
    font-size: 16px;
    font-weight: 600;
    color: white;
    letter-spacing: -0.01em;
  }

  .header-actions { display: flex; gap: 6px; }

  .icon-btn {
    width: 32px; height: 32px;
    border: none;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.3); }
  .icon-btn svg { width: 15px; height: 15px; }

  /* HERO */
  .hero {
    background: var(--white);
    padding: 28px 24px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .hero-avatar {
    width: 82px; height: 82px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6c8fff 0%, #4f6ef7 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    margin-bottom: 6px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(79,110,247,0.22);
  }
  .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .hero-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .hero-subtitle {
    font-size: 13.5px;
    color: var(--text-muted);
  }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--bg);
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-group { display: flex; flex-direction: column; gap: 2px; }
  .msg-group.user { align-items: flex-end; }
  .msg-group.bot { align-items: flex-start; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 82%;
  }
  .msg-group.user .msg-row { flex-direction: row-reverse; }

  .msg-avatar-sm {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    overflow: hidden;
    visibility: hidden;
  }
  .msg-group.bot .msg-row:last-of-type .msg-avatar-sm { visibility: visible; }
  .msg-avatar-sm img { width: 100%; height: 100%; object-fit: cover; }

  .bubble {
    padding: 11px 15px;
    border-radius: 20px;
    font-size: 14px;
    line-height: 1.55;
    max-width: 100%;
    word-break: break-word;
    animation: popIn 0.18s ease-out;
  }

  .msg-group.bot .bubble {
    background: var(--white);
    color: var(--text);
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.07);
  }

  .msg-group.user .bubble {
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 5px;
  }

  /* QUICK REPLIES */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 4px 0 4px 36px;
    animation: fadeUp 0.2s ease-out;
  }

  .qr-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--accent);
    background: white;
    color: var(--accent);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .qr-btn:hover { background: var(--accent); color: white; }
  .qr-btn:active { transform: scale(0.97); }

  /* TYPING */
  .typing-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 2px 0;
    animation: fadeUp 0.2s ease-out;
  }

  .typing-av {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    overflow: hidden;
  }
  .typing-av img { width: 100%; height: 100%; object-fit: cover; }

  .typing-bubble {
    background: var(--white);
    border-radius: 20px;
    border-bottom-left-radius: 5px;
    padding: 13px 16px;
    display: flex;
    gap: 5px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.07);
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #c0c4d6;
    animation: typing 1.2s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  /* INPUT */
  .input-area {
    padding: 10px 14px 16px;
    background: var(--bg);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    border-radius: 26px;
    padding: 8px 8px 8px 18px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 1.5px solid var(--border);
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  #msg-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    background: transparent;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  #msg-input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .send-btn:hover { background: var(--accent-dark); transform: scale(1.05); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn svg { width: 17px; height: 17px; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.93) translateY(4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%            { transform: translateY(-5px); opacity: 1; }
  }
</style>
</head>
<body>

<div class="chat-shell">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="header-avatar" id="header-av">🤖</div>
    <span class="header-name" id="header-name">KI Assistent</span>
    <div class="header-actions">
      <button class="icon-btn" title="Stumm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
      <button class="icon-btn" title="Neu starten" onclick="restartChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-4.68"/>
        </svg>
      </button>
      <button class="icon-btn" title="Schließen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-avatar" id="hero-av">🤖</div>
    <div class="hero-name" id="hero-name">KI Assistent</div>
    <div class="hero-subtitle" id="hero-subtitle">Ich helfe dir bei deinem Anliegen!</div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="msg-input" rows="1" placeholder="Message..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════
//  KONFIGURATION – hier anpassen
// ══════════════════════════════════════════════════
const CONFIG = {
  webhookUrl:     "https://marco00.app.n8n.cloud/webhook/zisterne-tempD",
  botName:        "Zisternen-Heini",
  botSubtitle:    "Ich helfe dir bei deinem Anliegen!",
  botEmoji:       "🤖",        // Emoji-Fallback wenn kein Bild
  botImageUrl:    "",           // z.B. "/avatar.png" – leer lassen für Emoji
  accentColor:    "#4f6ef7",    // Hauptfarbe (Hex)
  welcomeMessage: "Hallo! Ich bin dein persönlicher KI-Assistent. Wie kann ich dir helfen?",
  welcomeOptions: [             // Startbuttons – [] für keine
    "Produkte & Preise",
    "Support",
    "Rückruf anfragen"
  ]
};
// ══════════════════════════════════════════════════

let sessionId = "sess-" + Math.random().toString(36).slice(2);
let isWaiting = false;

function init() {
  // Accent-Farbe setzen
  document.documentElement.style.setProperty("--accent", CONFIG.accentColor);

  // Texte setzen
  document.getElementById("header-name").textContent  = CONFIG.botName;
  document.getElementById("hero-name").textContent    = CONFIG.botName;
  document.getElementById("hero-subtitle").textContent = CONFIG.botSubtitle;
  document.title = CONFIG.botName;

  // Avatare setzen
  const setAvatar = (el, large) => {
    if (CONFIG.botImageUrl) {
      el.innerHTML = `<img src="${CONFIG.botImageUrl}" alt="${CONFIG.botName}">`;
    } else {
      el.textContent = CONFIG.botEmoji;
      if (large) el.style.fontSize = "40px";
    }
  };
  setAvatar(document.getElementById("header-av"), false);
  setAvatar(document.getElementById("hero-av"), true);

  // Begrüßung
  if (CONFIG.welcomeMessage) {
    addBotMessage(CONFIG.welcomeMessage, CONFIG.welcomeOptions);
  }
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

async function sendMessage(text) {
  const input = document.getElementById("msg-input");
  const msg = text !== undefined ? text : input.value.trim();
  if (!msg || isWaiting) return;

  if (text === undefined) {
    input.value = "";
    input.style.height = "auto";
  }

  // Quick-Replies entfernen
  document.querySelectorAll(".quick-replies").forEach(el => el.remove());

  addUserMessage(msg);
  showTyping();
  isWaiting = true;

  try {
    const res = await fetch(CONFIG.webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, sessionId })
    });

    const data = await res.json();
    hideTyping();
    isWaiting = false;

    // Antwort aus verschiedenen möglichen Feldern lesen
    const botText = data.message || data.output || data.text || data.response || JSON.stringify(data);
    const options  = data.options || data.quickReplies || data.buttons || [];

    addBotMessage(botText, options);

  } catch (err) {
    hideTyping();
    isWaiting = false;
    addBotMessage("Es gab ein Verbindungsproblem. Bitte versuche es erneut.");
    console.error(err);
  }
}

function addUserMessage(text) {
  const msgs = document.getElementById("messages");
  const g = document.createElement("div");
  g.className = "msg-group user";
  g.innerHTML = `<div class="msg-row"><div class="bubble">${esc(text)}</div></div>`;
  msgs.appendChild(g);
  scrollBottom();
}

function addBotMessage(text, options = []) {
  const msgs = document.getElementById("messages");

  const avHtml = CONFIG.botImageUrl
    ? `<div class="msg-avatar-sm"><img src="${CONFIG.botImageUrl}" alt=""></div>`
    : `<div class="msg-avatar-sm">${CONFIG.botEmoji}</div>`;

  const g = document.createElement("div");
  g.className = "msg-group bot";
  g.innerHTML = `
    <div class="msg-row">
      ${avHtml}
      <div class="bubble">${esc(text)}</div>
    </div>`;
  msgs.appendChild(g);

  if (options.length > 0) {
    const qr = document.createElement("div");
    qr.className = "quick-replies";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "qr-btn";
      btn.textContent = opt;
      btn.onclick = () => sendMessage(opt);
      qr.appendChild(btn);
    });
    msgs.appendChild(qr);
  }

  scrollBottom();
}

let typingEl = null;
function showTyping() {
  const msgs = document.getElementById("messages");
  const avHtml = CONFIG.botImageUrl
    ? `<div class="typing-av"><img src="${CONFIG.botImageUrl}" alt=""></div>`
    : `<div class="typing-av">${CONFIG.botEmoji}</div>`;

  typingEl = document.createElement("div");
  typingEl.className = "typing-row";
  typingEl.innerHTML = `
    ${avHtml}
    <div class="typing-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  msgs.appendChild(typingEl);
  scrollBottom();
}

function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function scrollBottom() {
  const msgs = document.getElementById("messages");
  setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
}

function esc(str) {
  return str
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\n/g,"<br>");
}

function restartChat() {
  sessionId = "sess-" + Math.random().toString(36).slice(2);
  document.getElementById("messages").innerHTML = "";
  isWaiting = false;
  if (CONFIG.welcomeMessage) addBotMessage(CONFIG.welcomeMessage, CONFIG.welcomeOptions);
}

init();
</script>
</body>
</html>
